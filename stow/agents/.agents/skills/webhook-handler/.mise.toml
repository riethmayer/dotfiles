# Operational tasks for webhook-handler skill.
# Registered via root mise.toml task_config.includes.
#
# Project IDs (ultra-acre-286807) and Cloud Run URLs are intentionally hardcoded
# to ensure tasks always target the correct GCP project. Do not parameterize —
# accidental execution against the wrong project is worse than a find-and-replace
# if the project ever changes.

["webhooks:url"]
description = "Print webhook URL with token for a handler"
usage = 'arg "<handler>" help="webhook handler name, e.g. example"'
run = """
TOKEN=$(gcloud secrets versions access latest --secret=webhooks-server-auth-token-1)  # pragma: allowlist secret
URL="https://webhooks-server-231566094654.europe-west4.run.app/${usage_handler}/webhook?token=${TOKEN}"
echo ""
echo "Webhook URL for ${usage_handler}:"
echo "${URL}"
echo ""
echo "Share this URL with the webhook provider."
"""
dir = "{{config_root}}"

["webhooks:verify"]
description = "Query recent webhook events in BigQuery for a handler source"
usage = 'arg "<source>" help="webhook source name, e.g. affinity"'
run = '''
echo "Querying recent webhook events for source: ${usage_source}"
echo ""
RESULT=$(bq query --use_legacy_sql=false --format=pretty \
  "SELECT id, source, type, time, publish_time
   FROM \`ultra-acre-286807.raw.webhook_events\`
   WHERE source = '//webhooks.eagleeye.earlybird.com/${usage_source}'
   ORDER BY publish_time DESC
   LIMIT 10")
echo "$RESULT"
COUNT=$(echo "$RESULT" | grep -c "//webhooks.eagleeye.earlybird.com/${usage_source}" || true)
if [ "$COUNT" -eq 0 ]; then
  echo ""
  echo "ERROR: No events found for source '${usage_source}'."
  echo "Expected source format: //webhooks.eagleeye.earlybird.com/${usage_source}"
  echo "Check: handler name matches, webhook is configured, provider has sent events."
  exit 1
fi
'''
dir = "{{config_root}}"
