set-option -g default-shell /bin/zsh
set-option -g default-command "zsh -l"

# enable mouse
set -g mouse on
set -g detach-on-destroy off     # switch to next session instead of detaching
set -g escape-time 0 # zero-out escape time delay
set -g set-clipboard on          # use system clipboard

set -g status-position top       # macOS / darwin style
setw -g mode-keys vi
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=colour252,bg=default'
set -g pane-border-status top
set -g pane-border-format ' #{pane_title} '
set -g base-index 1 # Start windows and panes at 1, not 0
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-features ",xterm-ghostty:RGB"
set-option -sa terminal-features ",xterm-256color:RGB"
# set-option default-path "$PWD"
set-option -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u

# Set XDG plugin path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

# list of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'omerxx/catppuccin-tmux'

# floax config
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'false'

# sessionx config
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '~/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# continuum config
set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'

# resurrect config
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'off'

# Catppucin config
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W#{?#{@pr_info}, #{@pr_info}#{?#{!=:#{@pr_info},#{@pr_seen}}, 🔔,},}"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}#{?#{@pr_info}, #{@pr_info},}"
set -g @catppuccin_status_modules_right "directory date_time" # what is the meetings thing?
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
# set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
set -g @catppuccin_date_time_text "%H:%M#($HOME/bin/tmux-pr-check 2>/dev/null)"

# Status hierarchy — uses ANSI palette indices so colors inherit
# from the active Ghostty theme (Earlybird Dark or Light). Toggling
# macOS appearance flips terminal palette → tmux re-renders with new
# colors. No tmux reload needed.
#
# Mapping (consistent across both Earlybird themes):
#   colour1  → brand red       (active window bg)
#   colour15 → near-white fg   (active window text on red)
#   colour8  → muted gray-brown (inactive, badges, dim accents)
#   colour4  → blue accent     (session)
#   colour6  → teal accent     (directory)
set -g status-style "bg=default,fg=colour8"
set -g @catppuccin_window_default_color "colour8"
set -g @catppuccin_window_current_color "colour15"
set -g @catppuccin_window_current_background "colour1"
set -g @catppuccin_window_number_color "colour8"
set -g @catppuccin_session_color "colour4"
set -g @catppuccin_directory_color "colour6"
set -g @catppuccin_date_time_color "colour8"

# Clear PR bell on window select
set-hook -g after-select-window[100] 'run-shell -b "$HOME/bin/tmux-pr-check --seen"'

# https://github.com/3rd/image.nvim/tree/6fb2b84a739d92b781bba5f59f2678ea047332a9?tab=readme-ov-file
set -gq allow-passthrough on

# vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

run '~/.local/share/tmux/plugins/tpm/tpm'

# Source keybinds after TPM to prevent plugin overrides
source-file ~/.config/tmux/tmux.keybinds.conf

