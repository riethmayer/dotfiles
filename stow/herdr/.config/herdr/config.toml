# herdr configuration — mapped from ~/.config/tmux (see stow/tmux)
# Reference: https://herdr.dev/docs/config-reference/
# Apply live: herdr server reload-config
# Full defaults: herdr --default-config

# Skip first-run notification onboarding; toast delivery is set below.
onboarding = false

[theme]
# "terminal" inherits the outer terminal's ANSI palette — same trick as the
# tmux status config: Ghostty Earlybird Light/Dark toggles flow through
# without a reload.
name = "terminal"

auto_switch = false
[terminal]
# shell_mode "auto" = login shell on macOS (matches tmux `zsh -l`).
# new_cwd "follow" matches tmux's `-c "#{pane_current_path}"` binds.
# default_shell empty → $SHELL (zsh). All three are the defaults.
new_cwd = "follow"

[keys]
# tmux prefix
prefix = "ctrl+a"

# Splits, tmux-style: s = below (horizontal divider), v = right (vertical).
# split_horizontal's default "prefix+minus" is replaced; settings moves off
# "prefix+s" to make room.
split_horizontal = "prefix+s"
split_vertical = "prefix+v"
settings = "prefix+shift+s"

# Spaces: prefix+c opens a new space (Cmd+T in Ghostty sends prefix+c);
# Cmd+W (Ghostty sends alt+w) closes the current one — ui.confirm_close
# (default true) prompts first.
new_workspace = "prefix+c"
close_workspace = "alt+w"

# Tabs ≈ tmux windows; splits are the main tool, tabs stay on prefix+t.
# H/L = prev/next (tmux muscle memory, frees prefix+p / prefix+n).
new_tab = "prefix+t"
previous_tab = "prefix+shift+h"
next_tab = "prefix+shift+l"

# tmux `bind ^D detach`
detach = "prefix+ctrl+d"

# Rename current space (default was prefix+shift+w).
rename_workspace = "prefix+ctrl+r"

# Pane rename lives on prefix+p as the ID-prefixing popup below; the
# built-in rename_pane stays on its default prefix+shift+p as the raw
# (no-prefix) fallback.

# Focus/zoom the current pane (default was prefix+z).
zoom = "prefix+ctrl+f"

# tmux `bind Space last-window` — herdr has no last-tab, but last_pane is a
# global back-and-forth between the two most recently focused panes.
last_pane = "prefix+space"

# sessionx was on prefix+o → session navigator (goto): searchable
# workspace/tab/pane tree, closest to sessionx. The plain workspace picker
# keeps its default prefix+w. Notifications move to shift+o.
goto = "prefix+o"
open_notification_target = "prefix+shift+o"

# Direct space jumping: Cmd+1..9 (Ghostty sends prefix+shift+N).
switch_workspace = "prefix+shift+1..9"

# Picker / navigate-mode list movement, fzf-style.
navigate_workspace_up = "ctrl+p"
navigate_workspace_down = "ctrl+n"

# Pane focus h/j/k/l and zoom (prefix+z) already match tmux defaults.

# Rename the focused pane with its public ID auto-prefixed ("wK:p3 pull-flow").
# Popup commands get the underlying tiled pane as HERDR_ACTIVE_PANE_ID; the
# script (stow/scripts/bin) prompts with the current name minus the old prefix.
[[keys.command]]
key = "prefix+p"
type = "popup"
command = "$HOME/bin/herdr-rename-pane"
width = 60
height = 5

# floax-style scratch terminal: floating 80% overlay, closes on shell exit.
# Opens in the focused pane's cwd.
[[keys.command]]
key = "prefix+comma"
type = "popup"
command = "zsh -l"
width = "80%"
height = "80%"

# Persistent scratch: toggle to/from a real "scratch" workspace (created on
# first use) — panes and processes survive between visits, unlike the popup.
[[keys.command]]
key = "prefix+period"
type = "shell"
command = "$HOME/bin/herdr-scratch-toggle"

# Direct tab switching: alt+1..9 (Ghostty sends Cmd+N as Alt+N, as with tmux).
[keys.indexed]
tabs = "alt"

[ui]
# tmux active-pane border color
accent = "magenta"

# tmux creates windows instantly without a name prompt.
prompt_new_tab_name = false

show_agent_labels_on_pane_borders = true

# Room for goal text (defaults: min 18, max 36).
sidebar_max_width = 48

# Expanded space entries: name, then an optional goal line ($goal metadata —
# one row, no wrapping; skipped when unset).
# Set per space: herdr workspace report-metadata <id> --source claude --token goal="..."
[ui.sidebar.spaces]
rows = [["state_icon", "workspace", "$id"], ["$goal"], ["branch", "git_status"]]

[ui.toast]
# In-app toast popups ("terminal" would hand off to Ghostty desktop
# notifications instead — deliberately not doing that).
delivery = "herdr"

# Cross-referencing mentions: show pane/tab identity on expanded agent rows.
# Built-ins per release notes: state_icon, state_text, workspace, tab, pane,
# agent, terminal_title, terminal_title_stripped (+ $name metadata tokens).
# "pane" row = manual pane name (prefix+p) — pane borders only draw on splits,
# so this keeps the name visible when a tab has a single pane.
[ui.sidebar.agents]
rows = [["state_icon", "workspace", "agent", "$id", "$role"], ["pane"], ["terminal_title_stripped"]]

[experimental]
# Save recent pane screen history across full server restarts (crash-restart
# recovery). Writes raw pane contents to session-history.json — gitignored,
# and to be treated like shell history (can contain secrets).
pane_history = true
