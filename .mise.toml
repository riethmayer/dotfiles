# Dotfiles bootstrap

[tasks.help]
description = "Show available tasks and stow packages"
run = '''
echo "STOW_DIR: $(pwd)/stow"
echo "PACKAGES: $(ls -d stow/* | xargs basename -a | tr '\n' ' ')"
echo ""
echo "Available tasks:"
mise tasks
'''

[tasks.install]
description = "Install all stow packages"
run = '''
if [ -f stow/scripts/bin/personal-skills-sync ]; then
  bash stow/scripts/bin/personal-skills-sync --pre-stow
fi

# pi settings.json is a gitignored seam file (see 155_pi.sh); seed it before
# stow so the ~/.pi/agent/settings.json symlink always has a target.
if [ ! -f stow/pi/.pi/agent/settings.json ]; then
  cp stow/pi/.pi/agent/settings.json.example stow/pi/.pi/agent/settings.json
fi

# Pre-create dirs that stow would otherwise fold into repo-pointing dir
# symlinks; herdr writes runtime state (logs, sockets) next to its config.
mkdir -p ~/.config/herdr

STOW_DIR=$(pwd)/stow
PACKAGES=$(ls -d stow/* | xargs basename -a)
stow --dir $STOW_DIR --target ~ $PACKAGES
# AGENTS.md is source of truth; Claude Code needs it at ~/.claude/CLAUDE.md
ln -sf ~/.agents/AGENTS.md ~/.claude/CLAUDE.md
'''

[tasks.install-adopt]
description = "Install all stow packages and adopt existing files"
run = '''
STOW_DIR=$(pwd)/stow
PACKAGES=$(ls -d stow/* | xargs basename -a)
stow --dir $STOW_DIR --target ~ $PACKAGES --adopt
'''

[tasks.delete]
description = "Delete all stow symlinks"
run = '''
STOW_DIR=$(pwd)/stow
PACKAGES=$(ls -d stow/* | xargs basename -a)
stow --dir $STOW_DIR --delete --target ~ $PACKAGES
'''

[tasks.bootstrap]
description = "Bootstrap the entire environment"
depends = ["bootstrap-stage1", "install"]
run = '''
# Stage 2: Install all requirements
$HOME/bin/system-bootstrap.sh
'''

[tasks.bootstrap-stage1]
description = "Stage 1: Install Homebrew and Stow"
run = '''
stow/bootstrap/bin/system-bootstrap.sh
'''

[tasks.quick-bootstrap]
description = "Quick bootstrap for development setup"
depends = ["install"]
run = '''
#!/bin/bash

COLOR_BLUE="\033[0;34m"
COLOR_GREEN="\033[0;32m"
COLOR_RESET="\033[0m"

echo -e "${COLOR_GREEN}Starting quick bootstrap...${COLOR_RESET}"

# Run essential bootstrap scripts
dir="stow/bootstrap/.system-bootstrap.d"

for file in "$dir"/{020_mise.sh,080_atuin.sh,090_zsh_xdg.sh,100_lsp_servers.sh}; do
  if [ -f "$file" ]; then
    echo -e "${COLOR_BLUE}==> Processing $(basename "$file")...${COLOR_RESET}"
    chmod +x "$file"
    bash "$file"
  fi
done

echo -e "${COLOR_GREEN}Quick bootstrap completed!${COLOR_RESET}"
'''

[tasks.update]
description = "Sync dotfiles repo and handle git conflicts"
run = '''
#!/bin/bash

# Sync dotfiles repo and ensure that dotfiles are tangled correctly afterward

GREEN='\033[1;32m'
BLUE='\033[1;34m'
RED='\033[1;30m'
NC='\033[0m'

# Navigate to the repository root
cd "$(git rev-parse --show-toplevel)"

echo -e "${BLUE}Stashing existing changes...${NC}"
stash_result=$(git stash push -m "sync-dotfiles: Before syncing dotfiles")
needs_pop=1
if [ "$stash_result" = "No local changes to save" ]; then
  needs_pop=0
fi

echo -e "${BLUE}Pulling updates from dotfiles repo...${NC}"
echo
git pull origin main
echo

if [[ "$needs_pop" -eq "1" ]]; then
  echo -e "${BLUE}Popping stashed changes...${NC}"
  echo
  git stash pop
fi

unmerged_files=$(git diff --name-only --diff-filter=U)
if [[ ! -z $unmerged_files ]]; then
  echo -e "${RED}The following files have merge conflicts after popping the stash:${NC}"
  echo
  printf %"s\n" $unmerged_files # Ensure newlines are printed
  exit 1
fi

echo -e "${GREEN}Dotfiles sync completed successfully!${NC}"

if [ -f stow/scripts/bin/personal-skills-sync ]; then
  echo -e "${BLUE}Syncing personal skills...${NC}"
  bash stow/scripts/bin/personal-skills-sync
fi
'''

